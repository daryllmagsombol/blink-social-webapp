services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  blink-api:
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      APP_URL: ${BLINK_APP_URL}
      BACKEND_URL: ${BLINK_BACKEND_URL}
      FRONTEND_ORIGIN: ${BLINK_APP_URL}
      CORS_ORIGIN: ${BLINK_APP_URL}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/blink_social?schema=public
      UPLOADS_DIR: /workspace/uploads
      GITHUB_CLIENT_ID: ${BLINK_GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${BLINK_GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${BLINK_GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${BLINK_GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${BLINK_JWT_SECRET}
      JWT_REFRESH_SECRET: ${BLINK_JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${BLINK_JWT_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${BLINK_JWT_REFRESH_EXPIRES_IN}
    volumes:
      - blink-uploads:/workspace/uploads
    depends_on:
      postgres:
        condition: service_healthy

  blink-web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${BLINK_WEB_API_URL}
    restart: unless-stopped
    depends_on:
      blink-api:
        condition: service_started

  transformlit-api:
    build:
      context: ../../../new-transformlit-webapp
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3005
      CORS_ORIGIN: ${TRANSFORMLIT_APP_URL}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/transformlit?schema=public
      JWT_SECRET: ${TRANSFORMLIT_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  transformlit-web:
    build:
      context: ../../../new-transformlit-webapp
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${TRANSFORMLIT_WEB_API_URL}
    restart: unless-stopped
    depends_on:
      transformlit-api:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      blink-web:
        condition: service_started
      blink-api:
        condition: service_started
      transformlit-web:
        condition: service_started
      transformlit-api:
        condition: service_started
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro

volumes:
  postgres-data:
  blink-uploads:
